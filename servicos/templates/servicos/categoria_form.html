{% extends 'dashboard/base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold text-gray-900">{{ titulo }}</h1>
        <a href="{% url 'servicos:servico_list' %}"
            class="text-sm font-medium text-gray-600 hover:text-indigo-600">&larr; Voltar para catálogo</a>
    </div>

    <div class="bg-white shadow-sm border border-gray-200 rounded-lg overflow-hidden">
        <form method="POST" class="p-6 space-y-6">
            {% csrf_token %}

            <div class="space-y-4">
                <div>
                    <label for="{{ form.nome.id_for_label }}" class="block text-sm font-medium text-gray-700">Nome da
                        Categoria</label>
                    {{ form.nome }}
                </div>
                <div>
                    <label for="{{ form.descricao.id_for_label }}"
                        class="block text-sm font-medium text-gray-700">Descrição</label>
                    {{ form.descricao }}
                </div>
            </div>

            <div class="pt-4 border-t border-gray-200 flex justify-end gap-3">
                <a href="{% url 'servicos:servico_list' %}"
                    class="px-4 py-2 border border-gray-300 rounded-md text-sm font-medium text-gray-700 hover:bg-gray-50">Cancelar</a>
                <button type="submit"
                    class="px-4 py-2 bg-indigo-600 border border-transparent rounded-md text-sm font-medium text-white hover:bg-indigo-700">Salvar
                    Categoria</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
