{% extends 'dashboard/base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 py-8">
    <div class="mb-8">
        <h1 class="text-3xl font-black text-gray-900 tracking-tight">{{ titulo }}</h1>
        <p class="text-gray-500 mt-2 font-medium">Preencha os dados do fornecedor</p>
    </div>

    <div class="bg-white rounded-2xl shadow-xl border border-gray-100 p-8">
        <form method="post" class="space-y-6">
            {% csrf_token %}

            <div class="grid grid-cols-1 gap-6">
                {% for field in form %}
                <div>
                    <label for="{{ field.id_for_label }}" class="block text-sm font-bold text-gray-700 mb-1">
                        {{ field.label }}
                    </label>
                    {{ field }}
                    {% if field.errors %}
                    <p class="mt-1 text-xs text-red-600 font-medium">{{ field.errors.0 }}</p>
                    {% endif %}
                </div>
                {% endfor %}
            </div>

            <div class="pt-6 border-t border-gray-50 flex justify-end gap-3">
                <a href="{% url 'financeiro:fornecedor_list' %}"
                    class="px-6 py-2 border border-gray-300 rounded-xl text-sm font-bold text-gray-600 hover:bg-gray-50 transition-all">
                    Cancelar
                </a>
                <button type="submit"
                    class="px-6 py-2 bg-indigo-600 text-white rounded-xl text-sm font-bold hover:bg-indigo-700 transition-all shadow-md">
                    Salvar Fornecedor
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
